<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://unpkg.com;
    style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data: blob: https://unpkg.com https://*.basemaps.cartocdn.com https://*.openstreetmap.org;
    connect-src https://*.basemaps.cartocdn.com https://unpkg.com;
  " />
  <title>Sentry Drive</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- ── Left Panel ──────────────────────────────────────────────── -->
    <div id="left-panel">

      <div id="app-header">
        <div id="app-logo"><span class="material-icons">map</span></div>
        <div id="app-title">Sentry Drive</div>
      </div>

      <div id="tab-bar">
        <button class="tab-btn active" data-tab="processing">Processing</button>
        <button class="tab-btn" data-tab="drives">View Drives</button>
      </div>

      <!-- Processing Tab -->
      <div id="tab-processing" class="tab-pane active">

        <div class="field-group">
          <label class="field-label">Clips Directory</label>
          <div class="input-row">
            <input id="clips-dir" type="text" class="text-input" placeholder="Z:\RecentClips" />
            <button id="browse-clips" class="btn-icon" title="Browse">&#128193;</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Output Directory</label>
          <div class="input-row">
            <input id="output-path" type="text" class="text-input" placeholder="Select output directory..." />
            <button id="browse-output" class="btn-icon" title="Browse">&#128193;</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">
            <div class="worker-label-row">
              <span>Workers <span id="worker-count-display" class="worker-count-val">—</span></span>
              <button id="btn-auto-workers" class="btn-auto">Auto</button>
            </div>
          </label>
          <input id="worker-count" type="range" class="slider" min="1" max="32" value="4" />
        </div>

        <div class="btn-row">
          <button id="btn-start" class="btn-primary">Start Processing</button>
          <button id="btn-stop" class="btn-danger" disabled>Stop</button>
        </div>

        <div id="progress-section" class="hidden">
          <div id="progress-phase">Scanning…</div>
          <div class="progress-top">
            <div id="progress-track"><div id="progress-bar"></div></div>
            <div id="progress-label">0%</div>
          </div>
          <div id="eta-label"></div>
        </div>

        <div id="log-output"></div>

      </div>

      <!-- View Drives Tab -->
      <div id="tab-drives" class="tab-pane">

        <button id="btn-load-drives" class="btn-primary">Load Drives</button>
        <div class="btn-row">
          <button id="btn-repair-gps" class="btn-primary btn-secondary" disabled>Check Drives</button>
          <button id="btn-revert-gps" class="btn-danger" disabled>Revert</button>
        </div>

        <div id="repair-progress" class="hidden">
          <div class="repair-progress-label">
            <span id="repair-phase">Checking…</span>
            <span id="repair-eta"></span>
            <span id="repair-pct"></span>
          </div>
          <div class="repair-progress-track"><div id="repair-bar"></div></div>
        </div>

        <div id="tag-filter" class="hidden"></div>

        <div id="drive-info-panel" class="hidden"></div>

        <div id="drives-list"></div>

      </div>

      <!-- ── Panel Footer (always visible) ──────────────────────────── -->
      <div id="panel-footer">
        <div class="footer-left">
          <span class="footer-version">v1.0.0</span>
          <div class="footer-links">
            <a id="link-github" class="footer-link" title="GitHub" href="#">
              <svg class="footer-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
            <button id="link-discord" class="footer-link" title="Discord (coming soon)" disabled>
              <svg class="footer-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M13.55 3.15A13.2 13.2 0 0 0 10.3 2a9.2 9.2 0 0 0-.42.86 12.3 12.3 0 0 0-3.76 0A9.2 9.2 0 0 0 5.7 2a13.2 13.2 0 0 0-3.25 1.15C.36 6.46-.22 9.68.07 12.86a13.4 13.4 0 0 0 4.1 2.11 10 10 0 0 0 .87-1.43 8.6 8.6 0 0 1-1.37-.67c.12-.08.23-.17.34-.27a9.5 9.5 0 0 0 8.18 0c.11.1.22.19.34.27a8.6 8.6 0 0 1-1.37.67c.27.5.56.98.87 1.43a13.4 13.4 0 0 0 4.1-2.11c.34-3.67-.58-6.85-2.42-9.71zM5.34 10.96c-.83 0-1.5-.77-1.5-1.72s.66-1.72 1.5-1.72 1.52.78 1.5 1.72c0 .95-.66 1.72-1.5 1.72zm5.32 0c-.83 0-1.5-.77-1.5-1.72s.66-1.72 1.5-1.72 1.52.78 1.5 1.72c0 .95-.66 1.72-1.5 1.72z"/></svg>
            </button>
          </div>
        </div>
        <div class="footer-right">
          <button id="btn-footer-update" class="footer-update-btn hidden" title="Download Update">
            <span class="material-icons">download</span>
          </button>
          <button id="btn-settings" class="footer-link" title="Settings">
            <span class="material-icons footer-gear">settings</span>
          </button>
        </div>
      </div>

    </div>

    <!-- ── Settings Modal ───────────────────────────────────────────── -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-modal">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button id="btn-close-settings" class="settings-close">&times;</button>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <div class="settings-section-title">Version</div>
            <div class="settings-divider"></div>
            <div class="settings-version-info">
              <span id="settings-version-number">v1.0.0</span>
              <span id="settings-update-msg" class="hidden"></span>
            </div>
            <label class="settings-checkbox-row">
              <input type="checkbox" id="chk-beta" class="settings-checkbox" />
              <span class="settings-checkbox-label">Enroll in Beta</span>
            </label>
            <div id="beta-warning" class="beta-warning hidden">Beta releases may be unstable. Use at your own risk.</div>
            <button id="btn-check-update" class="btn-primary btn-update-full">Check for Update</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Update Modal ───────────────────────────────────────────── -->
    <div id="update-overlay" class="hidden">
      <div id="update-modal">
        <div class="update-modal-icon"><span class="material-icons">system_update</span></div>
        <div class="update-modal-title">Update Available</div>
        <div id="update-modal-msg">A new version is available.</div>
        <div class="update-modal-actions">
          <button id="btn-update-now" class="btn-primary btn-update-full">Update</button>
          <button id="btn-update-skip" class="update-skip-btn">Not Now</button>
        </div>
      </div>
    </div>

    <!-- ── Map Panel ────────────────────────────────────────────────── -->
    <div id="map-container">
      <div id="map"></div>
      <div id="loading-overlay" class="hidden">
        <div class="loading-content">
          <div class="loading-spinner"></div>
          <div class="loading-text">Loading drive data...</div>
        </div>
      </div>
      <button id="btn-back-overview" class="hidden"><span class="material-icons">arrow_back</span></button>
      <div id="map-stats" class="hidden"></div>
      <div id="map-legend" class="hidden">
        <span class="legend-item"><span class="legend-swatch fsd-on"></span>Full Self-Driving</span>
        <span class="legend-item"><span class="legend-swatch fsd-off"></span>Manual</span>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
