name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync package.json to tag (runner only)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json to $VERSION on the runner (not committed)."
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never

      - name: Upload assets (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.exe dist/latest.yml --clobber

      - name: Upload assets (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.dmg dist/latest-mac.yml --clobber
