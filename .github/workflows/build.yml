name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Sync package.json to tag (runner only)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json to $VERSION on the runner (not committed)."
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-builder --win --publish never

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.exe dist/*.yml --clobber
